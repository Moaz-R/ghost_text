<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostText - Hide Secret</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/css/hide-secret.css">
</head>

<body class="fade-in-page">

    <a href="index.html" class="back-button" id="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="app-container">
        <header class="header">
            <div class="logo">
                Gh<span class="ghost-logo">👻</span>st<span>Text</span>
            </div>
            <h1 class="main-title">Hide <span>Secret</span></h1>
            <p class="subtitle">Hide your secret message inside a normal text.</p>
        </header>

        <div class="separator-container">
            <svg class="shield-icon" width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
                <path d="m9 12 2 2 4-4" />
            </svg>
        </div>

        <main class="upload-section">
            <div class="upload-card">
                <svg class="card-icon" width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>

                <h3 class="card-title">Upload <span>Cover</span> .txt</h3>
                <p class="card-subtitle">Add the normal text file</p>

                <div class="browse-area" id="cover-file-area">
                    <svg class="upload-browse-icon upload-zone-icon" width="32" height="32" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9.12M12 10v9m0-9L9 13m3-3 3 3" />
                        <path d="M22 19a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3" />
                    </svg>
                    <p class="browse-text">
                        Click to browse<br>or <span>drag and drop</span>
                    </p>
                    <input type="file" id="coverFile" accept=".txt" hidden>
                </div>
            </div>

            <div class="plus-separator">
                <i class="fas fa-plus"></i>
            </div>

            <div class="upload-card" id="secret-card">
                <div class="card-tabs">
                    <button class="tab-btn active" data-target="file-upload">File</button>
                    <button class="tab-btn" data-target="text-input">Text</button>
                </div>

                <svg class="card-icon" width="48" height="48" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    <circle cx="12" cy="16" r="1" />
                    <line x1="12" y1="19" x2="12" y2="19" />
                </svg>

                <h3 class="card-title">Secret <span>Message</span></h3>
                <p class="card-subtitle" id="secret-subtitle">Upload .txt file or type it directly</p>

                <div class="browse-area" id="secret-file-area">
                    <svg class="upload-browse-icon upload-zone-icon" width="32" height="32" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9.12M12 10v9m0-9L9 13m3-3 3 3" />
                        <path d="M22 19a3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3" />
                    </svg>
                    <p class="browse-text">
                        Click to browse<br>or <span>drag and drop</span>
                    </p>
                    <input type="file" id="secretFile" accept=".txt" hidden>
                </div>

                <div class="text-input-area" id="secret-text-area" style="display: none;">
                    <textarea id="secretText" placeholder="Type your secret message here..."></textarea>
                </div>
            </div>
        </main>

        <footer class="action-section">
            <button class="main-btn" id="encryptBtn" type="button" disabled>
                <i class="fas fa-shield-alt"></i> Confirm & Encrypt
            </button>
        </footer>

        <div class="footer-info">
            <i class="fas fa-info-circle"></i>
            <span>The secret will be hidden using invisible characters.</span>
        </div>
    </div>

    <script src="../static/js/index.js"></script>
</body>

</html>
